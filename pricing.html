<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublicaPost — Precios y planes</title>
  <meta name="description" content="Empieza gratis con 3 generaciones. Sube al plan Básico o Pro para generaciones ilimitadas y acceso a todas las redes sociales." />
  <meta property="og:title" content="PublicaPost — Precios y planes" />
  <meta property="og:description" content="Empieza gratis con 3 generaciones. Sube al plan Básico o Pro para generaciones ilimitadas y acceso a todas las redes sociales." />
  <meta property="og:image" content="https://publicapost.es/og-image.png" />
  <meta property="og:url" content="https://publicapost.es/pricing.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PublicaPost — Precios y planes" />
  <meta name="twitter:description" content="Empieza gratis con 3 generaciones. Sube al plan Básico o Pro para generaciones ilimitadas." />
  <meta name="twitter:image" content="https://publicapost.es/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090b;
      --surface:  #111113;
      --surface2: #1c1c1f;
      --border:   #2a2a2e;
      --border-h: #3a3a3e;
      --text:     #fafafa;
      --muted:    #8e8e93;
      --radius:   16px;
      --ig:       linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: -220px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center,
        rgba(220,39,67,.10) 0%, rgba(188,24,136,.05) 45%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1080px; margin: 0 auto; padding: 26px 32px;
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em;
      background: var(--ig);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }

    .nav-center { display: flex; align-items: center; gap: 6px; }

    .nav-link {
      color: var(--muted); font-size: 0.84rem; font-weight: 600;
      text-decoration: none; padding: 7px 14px; border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--text); }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-uses       { font-size: 0.76rem; color: var(--muted); }
    .nav-user-email {
      font-size: 0.78rem; color: var(--muted);
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .nav-btn {
      font-family: inherit; font-size: 0.82rem; font-weight: 600;
      padding: 7px 14px; border-radius: 8px; cursor: pointer;
      text-decoration: none; border: 1px solid var(--border);
      transition: color .15s, border-color .15s, background .15s;
      display: inline-flex; align-items: center;
    }
    .nav-btn.login  { background: var(--surface2); color: var(--text); }
    .nav-btn.login:hover { border-color: var(--border-h); }
    .nav-btn.logout { background: none; color: var(--muted); }
    .nav-btn.logout:hover { color: var(--text); border-color: var(--border-h); }

    /* ── Layout ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1040px; margin: 0 auto;
      padding: 64px 24px 100px;
    }

    /* ── Header ── */
    .pricing-header { text-align: center; margin-bottom: 56px; }

    .pricing-header h1 {
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 800;
      letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 16px;
    }

    .pricing-header h1 span {
      background: var(--ig);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .pricing-header p {
      color: var(--muted); font-size: 1rem; line-height: 1.6;
      max-width: 480px; margin: 0 auto;
    }

    /* ── Plan grid ── */
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 800px) {
      .plan-grid { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }
    }

    /* ── Plan card ── */
    .plan-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px;
      display: flex; flex-direction: column; gap: 28px;
      transition: border-color .2s;
      position: relative;
    }

    .plan-card:hover { border-color: var(--border-h); }

    .plan-card.featured {
      border: 2px solid transparent;
      background: linear-gradient(var(--surface), var(--surface)) padding-box, var(--ig) border-box;
      box-shadow: 0 0 40px rgba(220,39,67,.1);
    }

    /* ── Plan top ── */
    .plan-top {}

    .plan-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }

    .plan-name {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.01em;
    }

    .plan-popular {
      font-size: 0.66rem; font-weight: 800; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 100px;
      background: var(--ig); color: #fff;
    }

    .plan-current-badge {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 100px;
      background: var(--surface2); border: 1px solid var(--border-h);
      color: var(--muted);
    }

    .plan-price {
      display: flex; align-items: baseline; gap: 4px;
      margin-bottom: 8px;
    }

    .plan-amount {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -0.04em;
      line-height: 1;
    }

    .plan-period {
      font-size: 0.88rem; color: var(--muted); font-weight: 400;
    }

    .plan-desc {
      font-size: 0.84rem; color: var(--muted); line-height: 1.5;
    }

    /* ── Features ── */
    .plan-features {
      display: flex; flex-direction: column; gap: 11px;
      flex: 1;
    }

    .feature {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.86rem; line-height: 1.45;
    }

    .feature-icon {
      font-size: 0.75rem; font-weight: 800; flex-shrink: 0;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }

    .feature.yes .feature-icon {
      background: rgba(34,197,94,.15); color: #4ade80;
    }

    .feature.no .feature-icon {
      background: var(--surface2); color: var(--border-h);
    }

    .feature.no .feature-text { color: var(--muted); }

    .feature.soon .feature-icon {
      background: rgba(168,85,247,.15); color: #c084fc;
    }

    .feature.soon .feature-text { color: var(--muted); }

    .feature-text { flex: 1; color: var(--text); }

    .feature-tag {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 1px 6px; border-radius: 4px;
      background: rgba(168,85,247,.15); color: #c084fc; margin-left: 4px;
      white-space: nowrap;
    }

    /* ── Subscribe button ── */
    .sub-btn {
      width: 100%; border: none; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit; font-size: 0.93rem; font-weight: 700; padding: 15px;
      transition: opacity .15s, transform .15s;
    }

    .sub-btn.gradient { background: var(--ig); color: #fff; }
    .sub-btn.gradient:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }

    .sub-btn.outline {
      background: none; border: 1px solid var(--border); color: var(--text);
    }
    .sub-btn.outline:hover:not(:disabled) { border-color: var(--border-h); background: var(--surface2); }

    .sub-btn.current {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: default;
    }

    .sub-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    /* ── Spin ── */
    .btn-spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: rot .65s linear infinite;
      display: none; flex-shrink: 0;
    }
    .btn-spin.dark {
      border-color: rgba(255,255,255,.2); border-top-color: var(--muted);
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Error toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(220,39,67,.12); border: 1px solid rgba(220,39,67,.35);
      color: #f87171; border-radius: 10px; padding: 12px 20px;
      font-size: 0.86rem; font-weight: 500;
      z-index: 100; display: none; white-space: nowrap;
      animation: fadeUp .2s ease;
    }
    .toast.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Footer note ── */
    .pricing-note {
      text-align: center; margin-top: 40px;
      font-size: 0.8rem; color: var(--muted); line-height: 1.6;
    }
    .pricing-note a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
    .pricing-note a:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-brand">PublicaPost</a>
    <div class="nav-center">
      <a href="/app.html" class="nav-link">Herramienta</a>
      <a href="/pricing.html" class="nav-link active">Precios</a>
    </div>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="wrap">

    <div class="pricing-header">
      <h1>Planes simples,<br><span>sin sorpresas</span></h1>
      <p>Empieza gratis y suscríbete cuando necesites más.</p>
    </div>

    <div class="plan-grid" id="planGrid">
      <!-- Rendered by JS -->
    </div>

    <p class="pricing-note">
      Todos los precios incluyen IVA. Cancela cuando quieras desde tu área de cliente de Stripe.<br>
      ¿Tienes dudas? <a href="mailto:hola@publicapost.app">Escríbenos</a>
    </p>

  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ─── Supabase ─────────────────────────────────────────────
  const { createClient } = window.supabase;
  const sb = createClient(
    'https://znzsjnfqmegnszwyttxe.supabase.co',
    'sb_publishable_fnq14OvDXOOUkUP1_sYc_A_mC1nDUi7'
  );

  let currentUser = null;
  let currentPlan = 'free';

  // ─── Plans data ───────────────────────────────────────────
  const PLANS = [
    {
      id:      'free',
      name:    'Gratis',
      amount:  '0€',
      period:  '',
      desc:    'Para descubrir PublicaPost',
      priceId: null,
      features: [
        { text: '3 generaciones gratuitas',    type: 'yes'  },
        { text: '5 redes sociales',             type: 'yes'  },
        { text: '4 tonos de escritura',         type: 'yes'  },
        { text: 'Adaptar contenido e ideas',    type: 'yes'  },
        { text: 'Historial local',              type: 'yes'  },
        { text: 'Generaciones ilimitadas',      type: 'no'   },
        { text: 'Soporte',                      type: 'no'   },
      ],
    },
    {
      id:       'basic',
      name:     'Básico',
      amount:   '9€',
      period:   '/mes',
      desc:     'Para creadores y profesionales',
      priceId:  'price_1Te0DbEHGpx523xpOxmBBi4e',
      featured: true,
      features: [
        { text: 'Generaciones ilimitadas',   type: 'yes' },
        { text: '5 redes sociales',           type: 'yes' },
        { text: '4 tonos de escritura',       type: 'yes' },
        { text: 'Adaptar contenido e ideas',  type: 'yes' },
        { text: 'Historial local',            type: 'yes' },
        { text: 'Soporte por email',          type: 'yes' },
        { text: 'Historial en la nube',       type: 'no'  },
      ],
    },
    {
      id:      'pro',
      name:    'Pro',
      amount:  '19€',
      period:  '/mes',
      desc:    'Para equipos y agencias',
      priceId: 'price_1Te0FzEHGpx523xpxs5xqe4O',
      features: [
        { text: 'Generaciones ilimitadas',      type: 'yes'  },
        { text: '5 redes sociales',              type: 'yes'  },
        { text: '4 tonos de escritura',          type: 'yes'  },
        { text: 'Adaptar contenido e ideas',     type: 'yes'  },
        { text: 'Historial local',               type: 'yes'  },
        { text: 'Historial en la nube',          type: 'soon', tag: 'Próx.' },
        { text: 'API de generación',             type: 'soon', tag: 'Próx.' },
        { text: 'Soporte prioritario',           type: 'yes'  },
      ],
    },
  ];

  // ─── Render ───────────────────────────────────────────────
  function renderPlans() {
    const grid = document.getElementById('planGrid');
    grid.innerHTML = '';

    PLANS.forEach(plan => {
      const isCurrent  = plan.id === currentPlan;
      const featHtml   = plan.features.map(f => {
        const icon = f.type === 'yes' ? '✓' : (f.type === 'soon' ? '◐' : '—');
        const tag  = f.tag ? `<span class="feature-tag">${f.tag}</span>` : '';
        return `<div class="feature ${f.type}">
          <span class="feature-icon">${icon}</span>
          <span class="feature-text">${f.text}${tag}</span>
        </div>`;
      }).join('');

      let badgeHtml = '';
      if (plan.featured && !isCurrent) badgeHtml = `<span class="plan-popular">Más popular</span>`;
      if (isCurrent)                   badgeHtml = `<span class="plan-current-badge">Plan actual</span>`;

      let btnHtml;
      if (isCurrent) {
        btnHtml = `<button class="sub-btn current" disabled>Plan actual</button>`;
      } else if (!plan.priceId) {
        btnHtml = `<button class="sub-btn outline" disabled>Gratis</button>`;
      } else {
        const cls = plan.featured ? 'gradient' : 'outline';
        btnHtml = `
          <button class="sub-btn ${cls}" id="btn-${plan.id}" onclick="subscribe('${plan.priceId}', '${plan.id}')">
            <span class="btn-spin${cls === 'outline' ? ' dark' : ''}" id="spin-${plan.id}"></span>
            <span id="lbl-${plan.id}">Suscribirse · ${plan.amount}${plan.period}</span>
          </button>`;
      }

      grid.insertAdjacentHTML('beforeend', `
        <div class="plan-card${plan.featured ? ' featured' : ''}">
          <div class="plan-top">
            <div class="plan-meta">
              <span class="plan-name">${plan.name}</span>
              ${badgeHtml}
            </div>
            <div class="plan-price">
              <span class="plan-amount">${plan.amount}</span>
              <span class="plan-period">${plan.period}</span>
            </div>
            <p class="plan-desc">${plan.desc}</p>
          </div>
          <div class="plan-features">${featHtml}</div>
          ${btnHtml}
        </div>`);
    });
  }

  // ─── Subscribe ────────────────────────────────────────────
  async function subscribe(priceId, planId) {
    if (!currentUser) {
      window.location.href = '/auth.html?modo=login&redirect=/pricing.html';
      return;
    }

    const btn  = document.getElementById(`btn-${planId}`);
    const spin = document.getElementById(`spin-${planId}`);
    const lbl  = document.getElementById(`lbl-${planId}`);

    btn.disabled         = true;
    spin.style.display   = 'block';
    lbl.textContent      = 'Redirigiendo…';

    try {
      const res = await fetch('/.netlify/functions/create-checkout', {
        method:  'POST',
        headers: { 'content-type': 'application/json' },
        body:    JSON.stringify({
          priceId,
          userId:    currentUser.id,
          userEmail: currentUser.email,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || `Error ${res.status}`);
      window.location.href = data.url;
    } catch (e) {
      showToast(e.message);
      btn.disabled       = false;
      spin.style.display = 'none';
      lbl.textContent    = `Suscribirse · ${PLANS.find(p => p.id === planId)?.amount || ''}`;
    }
  }

  // ─── Auth ─────────────────────────────────────────────────
  async function initAuth() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session?.user ?? null;

    if (currentUser) {
      try {
        const { data } = await sb
          .from('subscriptions')
          .select('plan')
          .eq('user_id', currentUser.id)
          .maybeSingle();
        currentPlan = data?.plan || 'free';
      } catch {
        currentPlan = 'free';
      }
    }

    renderNav();
    renderPlans();

    sb.auth.onAuthStateChange((_ev, session) => {
      currentUser = session?.user ?? null;
      renderNav();
    });
  }

  function renderNav() {
    const el = document.getElementById('navRight');
    if (currentUser) {
      el.innerHTML = `
        <span class="nav-user-email">${escHtml(currentUser.email)}</span>
        <button class="nav-btn logout" onclick="logout()">Salir</button>`;
    } else {
      el.innerHTML = `<a href="/auth.html" class="nav-btn login">Iniciar sesión</a>`;
    }
  }

  async function logout() { await sb.auth.signOut(); window.location.reload(); }

  // ─── Toast ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Init ─────────────────────────────────────────────────
  renderPlans(); // render with defaults while auth loads
  initAuth();
</script>
</body>
</html>

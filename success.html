  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090b;
      --surface:  #111113;
      --surface2: #1c1c1f;
      --border:   #2a2a2e;
      --text:     #fafafa;
      --muted:    #8e8e93;
      --ig:       linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: -220px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center,
        rgba(34,197,94,.10) 0%, rgba(16,185,129,.05) 45%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 52px 44px;
      max-width: 480px; width: 100%; text-align: center;
      animation: fadeUp .3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 28px;
    }

    h1 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em;
      line-height: 1.15; margin-bottom: 14px;
    }

    h1 span {
      background: var(--ig);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    p {
      color: var(--muted); font-size: 0.92rem; line-height: 1.65;
      margin-bottom: 36px;
    }

    .cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--ig); border: none; border-radius: 12px;
      color: #fff; cursor: pointer; font-family: inherit;
      font-size: 0.95rem; font-weight: 700; padding: 15px 32px;
      text-decoration: none; transition: opacity .15s, transform .15s;
      width: 100%; justify-content: center;
    }
    .cta:hover { opacity: .9; transform: translateY(-1px); }

    .note {
      font-size: 0.78rem; color: var(--muted);
      margin-top: 20px; margin-bottom: 0;
    }

    .nav-brand {
      position: fixed; top: 28px; left: 32px; z-index: 10;
      font-size: 1rem; font-weight: 800; letter-spacing: -0.03em;
      background: var(--ig);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a href="/" class="nav-brand">PublicaPost</a>

  <div class="card">
    <div class="success-icon">✓</div>
    <h1>¡Tu plan está <span>activo</span>!</h1>
    <p>
      Tu suscripción se ha procesado correctamente.<br>
      Ya tienes acceso a generaciones ilimitadas.
    </p>
    <a href="/app.html" class="cta">Ir a la herramienta →</a>
    <p class="note">
      Recibirás un recibo en tu email. Puedes gestionar tu suscripción desde el enlace en cualquier recibo de Stripe.
    </p>
  </div>
</body>
